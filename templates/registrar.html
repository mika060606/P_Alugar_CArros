<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - VaiCarros</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{ url_for("static", filename="imagem colada.png") }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: -webkit-optimize-contrast;
            filter: contrast(1.1) brightness(0.9);
            opacity: 0.5;
            z-index: -1;
        }
        .login-container {
            background-color: rgba(248, 248, 248, 0.9);
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 480px;
            min-height: 620px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-radius: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 3.5em;
            margin-top: 10px;
            margin-bottom: 40px;
            font-family: 'Disco Diva', 'Righteous', cursive;
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #45a049;
        }
        .btn-text {
            background-color: transparent;
            color: #333;
            box-shadow: none;
        }
        .btn-text:hover {
            background-color: transparent;
            color: #000;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Bloco de Alertas Flash -->
<style>
    /* Estilo do Retângulo de Erro */
    .flash-alert {
        position: fixed;
        top: -100px; /* Começa escondido acima */
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        width: 90%;
        max-width: 450px;
        color: #fff;
        padding: 16px 24px;
        border-radius: 12px; /* Cantos arredondados */
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Roboto', sans-serif;
        font-weight: 500;
        transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* Efeito elástico */
    }

    .flash-error {
        background-color: #ff4d4d; /* Vermelho vibrante */
    }

    .flash-success {
        background-color: #28a745; /* Verde */
    }

    .flash-warning {
        background-color: #ffc107; /* Amarelo */
        color: #333;
    }

    .flash-info {
        background-color: #17a2b8; /* Azul */
    }

    /* Classe ativada pelo JS para descer o alerta */
    .flash-alert.active {
        top: 25px;
    }

    .flash-close-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 20px;
        cursor: pointer;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .flash-close-btn:hover {
        background: rgba(255, 255, 255, 0.4);
    }
</style>

    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash-alert flash-{{ category }}" id="custom-alert">
          <span>{{ message }}</span>
          <button class="flash-close-btn" onclick="hideAlert()">&times;</button>
      </div>
    {% endfor %}

    <script>
        function hideAlert() {
            const alert = document.getElementById('custom-alert');
            if (alert) {
                alert.classList.remove('active');
                // Remove do DOM após a transição
                setTimeout(() => alert.remove(), 600);
            }
        }

        // Timer para mostrar o erro após o reload da página
        window.addEventListener('load', () => {
            const alert = document.getElementById('custom-alert');
            if (alert) {
                // Pequeno atraso (500ms) para o utilizador ver a animação descendo
                setTimeout(() => {
                    alert.classList.add('active');
                }, 500);

                // Sumir automaticamente após 5 segundos
                setTimeout(hideAlert, 5500); // 5s visível + 0.5s de delay inicial
            }
        });
    </script>
  {% endif %}
{% endwith %}

    <div class="login-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 150px; display: block; margin: 0 auto 20px;">
        <h2>VaiCarros</h2>
        <form action="#" method="POST">
            <input type="text" name="nome" placeholder="Nome" required>
            <input type="text" name="sobrenome" placeholder="Sobrenome" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="tel" name="numero" placeholder="Número" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <input type="password" name="confirmar_senha" placeholder="Confirmar senha" required>
            <label class="checkbox-group">
                <input type="checkbox" name="termos" required>
                Confirmar com os termos
            </label>
            <button type="submit">Registrar</button>
            <button type="button" onclick="window.location.href='/login'">Voltar</button>
        </form>
    </div>
</body>
</html>
