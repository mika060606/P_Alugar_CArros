<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaiCarros</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{{ url_for("static", filename="Imagem colada.png") }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            image-rendering: -webkit-optimize-contrast; /* Melhora a nitidez em navegadores como Chrome e Edge */
            filter: contrast(1.1) brightness(0.9); /* Realça os detalhes e as cores */
            opacity: 0.5; /* Ajusta a transparência aqui (0.0 a 1.0) */
            z-index: -1;
        }
        .login-container {
            background-color: rgba(248, 248, 248, 0.9);
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 480px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-radius: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 3.5em; 
            margin-top: 10px; 
            margin-bottom: 40px;
            font-family: 'Disco Diva', 'Righteous', cursive;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            box-sizing: border-box;
        }
        button:hover {
            background-color: #45a049;
        }
        .btn-text {
            background-color: transparent;
            color: #333;
            box-shadow: none;
        }
        .btn-text:hover {
            background-color: transparent;
            color: #000;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 150px; display: block; margin: 0 auto 20px;">
        <h2>VaiCarros</h2>
        <form action="#" method="post">
            <input type="text" name="username" placeholder="Nome de utilizador" required>
            <input type="password" name="password" placeholder="Palavra-passe" required>
            <button type="submit">Conectar</button>
            <button type="button">Registrar</button>
            <button type="button" href="/" class="btn-text">Entrar sem conta</button>
        </form>
    </div>
</body>
</html>
